<div class="max-w-4xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow-lg overflow-hidden">
    <!-- Profile Header -->
    <div class="bg-gradient-to-r from-pink-600 to-red-400 p-6 text-white relative">
      <div class="flex items-center space-x-4">
        <div class="relative">
          <img [src]="userProfile?.photoURL || 'assets/default-avatar.png'" 
               alt="Profile Photo"
               class="w-24 h-24 rounded-full object-cover border-4 border-white">
          <label *ngIf="isEditing" 
                 class="absolute bottom-0 right-0 bg-white rounded-full p-2 cursor-pointer shadow-lg">
            <input type="file" 
                   accept="image/*" 
                   class="hidden" 
                   (change)="onPhotoSelect($event)">
            <i class="fas fa-camera text-pink-600"></i>
          </label>
        </div>
        <div>
          <h1 class="text-2xl font-bold">{{ userProfile?.name }}</h1>
          <p class="text-sm opacity-90">{{ userProfile?.email }}</p>
        </div>
        <button (click)="toggleEdit()" 
                class="ml-auto bg-white text-pink-600 px-4 py-2 rounded-full hover:bg-pink-50">
          {{ isEditing ? 'Cancel' : 'Edit Profile' }}
        </button>
      </div>
    </div>

    <!-- Profile Content -->
    <div class="p-6">
      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Basic Information -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" 
                   formControlName="name"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Gender</label>
            <select formControlName="gender"
                    [disabled]="!isEditing"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <!-- Date of Birth -->
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Day</label>
            <select formControlName="birthDay"
                    [disabled]="!isEditing"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
              <option *ngFor="let day of Array(31).fill(1).map((x,i)=>i+1)" [value]="day">
                {{day}}
              </option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Month</label>
            <select formControlName="birthMonth"
                    [disabled]="!isEditing"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
              <option value="1">January</option>
              <option value="2">February</option>
              <!-- Add all months -->
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Year</label>
            <select formControlName="birthYear"
                    [disabled]="!isEditing"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
              <option *ngFor="let year of Array(50).fill(2024).map((x,i)=>x-i)" [value]="year">
                {{year}}
              </option>
            </select>
          </div>
        </div>

        <!-- Religion Information -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700">Religion</label>
            <select formControlName="religion"
                    [disabled]="!isEditing"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
              <option value="hindu">Hindu</option>
              <option value="muslim">Muslim</option>
              <option value="christian">Christian</option>
              <option value="sikh">Sikh</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Caste</label>
            <input type="text"
                   formControlName="caste"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Subcaste (Optional)</label>
            <input type="text"
                   formControlName="subcaste"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
        </div>

        <!-- Contact Information -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700">Mobile</label>
            <input type="tel"
                   formControlName="mobile"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Mother Tongue</label>
            <input type="text"
                   formControlName="motherTongue"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
        </div>

        <!-- Location Information -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700">Country</label>
            <input type="text"
                   formControlName="country"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">State</label>
            <input type="text"
                   formControlName="state"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">City</label>
            <input type="text"
                   formControlName="city"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
        </div>

        <!-- Professional Information -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700">Education</label>
            <input type="text"
                   formControlName="education"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Occupation</label>
            <input type="text"
                   formControlName="occupation"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Annual Income</label>
            <input type="text"
                   formControlName="income"
                   [readonly]="!isEditing"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
          </div>
        </div>

        <!-- Submit Button -->
        <div class="flex justify-end space-x-4" *ngIf="isEditing">
          <button type="button"
                  (click)="toggleEdit()"
                  class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50">
            Cancel
          </button>
          <button type="submit"
                  [disabled]="!profileForm.valid || isLoading"
                  class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-pink-600 hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500">
            {{ isLoading ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
