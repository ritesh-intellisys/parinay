<section class="bg-white py-16 px-6">
    <div class="max-w-4xl mx-auto text-center">
      <h1 class="text-4xl font-bold text-pink-600 mb-6">Contact Us</h1>
      <p class="text-gray-700 mb-10 text-lg">
        We'd love to hear from you! Whether you have a question, feedback, or just want to say hello.
      </p>
  
      <form class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input type="text" placeholder="Your name" class="w-full p-3 border rounded shadow-sm" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" placeholder="you@example.com" class="w-full p-3 border rounded shadow-sm" />
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
          <textarea rows="5" placeholder="Your message" class="w-full p-3 border rounded shadow-sm"></textarea>
        </div>
        <div class="md:col-span-2 text-center">
          <button type="submit" class="bg-gradient-to-r from-pink-500 to-red-400 text-white px-6 py-3 rounded shadow hover:opacity-90 transition-all duration-300">
            Send Message
          </button>
        </div>
      </form>
    </div>
  </section>
